<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Messenger</title>
<!-- Import Supabase from CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --background: #36393f; /* Discord dark background */
    --chat-background: #2f3136;
    --input-background: #40444b;
    --text-color: #dcddde;
    --user-bubble: #5865f2;
    --other-bubble: #444851;
    --accent: #5865f2;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background-color: var(--background);
    color: var(--text-color);
  }

  /* Header similar to Discord's top bar */
  header {
    background-color: #202225;
    padding: 16px;
    font-weight: 600;
    font-size: 1.2rem;
    letter-spacing: 1px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    color: #fff;
  }

  /* Chat messages container */
  #chat-box {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Scrollbar styles for WebKit */
  #chat-box::-webkit-scrollbar {
    width: 8px;
  }
  #chat-box::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 4px;
  }

  /* Message wrapper */
  .message-wrapper {
    display: flex;
    flex-direction: column;
    max-width: 70%;
    animation: fadeIn 0.3s ease;
  }

  /* Alignment for user messages */
  .me {
    align-self: flex-end;
    align-items: flex-end;
  }

  /* Alignment for others' messages */
  .other {
    align-self: flex-start;
    align-items: flex-start;
  }

  /* Username label, smaller font */
  .username-label {
    font-size: 0.75rem;
    color: #bbb;
    margin-bottom: 2px;
    margin-left: 4px;
    margin-right: 4px;
  }

  /* Message bubble styling */
  .bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 1rem;
    line-height: 1.4;
    max-width: 100%;
    box-shadow: 0 1px 2px rgba(0,0,0,0.4);
    word-wrap: break-word;
    transition: background-color 0.2s;
  }

  /* Different colors for sender/receiver */
  .me .bubble {
    background-color: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .other .bubble {
    background-color: var(--other-bubble);
    color: #ddd;
    border-bottom-left-radius: 4px;
  }

  /* Input area at bottom, Discord style */
  #input-area {
    display: flex;
    padding: 12px 20px;
    background-color: #202225;
    border-top: 1px solid #202225;
    gap: 10px;
  }

  #message-input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 25px;
    border: 1px solid #444;
    background-color: var(--input-background);
    color: #ddd;
    outline: none;
    font-size: 1rem;
    transition: border-color 0.2s, background-color 0.2s;
  }

  #message-input:focus {
    border-color: var(--accent);
    background-color: #50545b;
  }

  #send-btn {
    padding: 0 20px;
    border-radius: 25px;
    border: none;
    background-color: var(--accent);
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    font-size: 1rem;
    transition: background-color 0.2s;
  }

  #send-btn:hover {
    background-color: #4752c4;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  MESSENGER
</header>

<div id="chat-box">
  <!-- Messages will appear here -->
</div>

<div id="input-area">
  <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" />
  <button id="send-btn">Send</button>
</div>

<script>
  // ==========================================
  // CONFIGURATION
  // ==========================================
  const SUPABASE_URL = 'https://zcmdacttroxthxcskcqs.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_8WfD_BR08R-dEkduCnP91A_XdeohqBw';
  // ==========================================

  const { createClient } = supabase;
  const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  const chatBox = document.getElementById('chat-box');
  const messageInput = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');

  let myUsername = localStorage.getItem('chatUsername');

  function initUser() {
    if (!myUsername) {
      let input = prompt("Please enter your username:");
      if (input && input.trim() !== "") {
        myUsername = input.trim();
        localStorage.setItem('chatUsername', myUsername);
      } else {
        myUsername = "Anonymous";
      }
    }
    console.log("Logged in as:", myUsername);
  }

  function renderMessage(msg, isMe) {
    const wrapper = document.createElement('div');
    wrapper.className = 'message-wrapper ' + (isMe ? 'me' : 'other');

    const label = document.createElement('div');
    label.className = 'username-label';
    label.innerText = msg.username;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerText = msg.content;

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    chatBox.appendChild(wrapper);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  async function loadHistory() {
    const { data, error } = await _supabase
      .from('messages')
      .select('*')
      .order('created_at', { ascending: true });
    if (error) console.error('Error loading:', error);
    else {
      data.forEach(msg => {
        renderMessage(msg, msg.username === myUsername);
      });
    }
  }

  async function sendMessage() {
    const content = messageInput.value.trim();
    if (!content) return;
    messageInput.value = '';

    const msg = { username: myUsername, content: content };
    const { error } = await _supabase.from('messages').insert([msg]);
    if (error) {
      console.error('Error sending:', error);
      alert('Error sending message. Check console.');
    }
  }

  function subscribeToMessages() {
    _supabase
      .channel('public:messages')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
        const newMsg = payload.new;
        const isMe = newMsg.username === myUsername;
        renderMessage(newMsg, isMe);
      })
      .subscribe();
  }

  sendBtn.addEventListener('click', sendMessage);
  messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  initUser();
  loadHistory();
  subscribeToMessages();
</script>
</body>
</html>
