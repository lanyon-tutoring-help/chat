<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #000;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    background-color: #111;
    padding: 15px;
    text-align: center;
    font-size: 1.8em;
    font-weight: bold;
    color: #fff;
    letter-spacing: 1px;
  }
  #messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    background-color: #000;
  }
  .message-container {
    display: flex;
    flex-direction: column;
    margin: 8px 0;
    max-width: 70%;
  }
  .sender-name {
    font-size: 0.75em;
    color: #aaa;
    margin-bottom: 2px;
    padding: 0 10px;
    font-style: italic;
  }
  .message {
    padding: 10px 16px;
    border-radius: 20px;
    word-wrap: break-word;
    font-size: 0.95em;
    line-height: 1.4;
  }
  .message.self {
    align-self: flex-end;
    background-color: #3772ff;
    color: #fff;
    border-radius: 20px 20px 0 20px;
  }
  .message.other {
    align-self: flex-start;
    background-color: #444;
    color: #fff;
    border-radius: 20px 20px 20px 0;
  }
  #inputContainer {
    display: flex;
    padding: 10px;
    background-color: #111;
  }
  #messageInput {
    flex: 1;
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    font-size: 1em;
    outline: none;
    background-color: #222;
    color: #fff;
  }
  #sendBtn {
    margin-left: 10px;
    padding: 0 25px;
    border: none;
    border-radius: 25px;
    background-color: #3772ff;
    color: #fff;
    font-weight: bold;
    font-size: 1em;
    cursor: pointer;
    transition: background-color 0.2s;
  }
  #sendBtn:hover {
    background-color: #2551cc;
  }
</style>
</head>
<body>
<header>Chat</header>
<div id="messages"></div>
<div id="inputContainer">
  <input type="text" id="messageInput" placeholder="Type a message..." />
  <button id="sendBtn">Send</button>
</div>

<!-- Include Supabase JS library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
<script>
  // Replace these with your actual Supabase project details
  const supabaseUrl = 'https://wvuiozuuqwmoaqxnxcsv.supabase.co'; // e.g., https://xyzcompany.supabase.co
  const supabaseKey = 'sb_publishable_c0qfTWZLVDWERGhY3APRjw_qZfIbVJk'; // Your anon key
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  let username = prompt("Enter your username:");

  const messagesDiv = document.getElementById('messages');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');

  // Function to add message to chat window
  function addMessage(msg, sender, isSelf) {
    const container = document.createElement('div');
    container.className = 'message-container';

    const senderName = document.createElement('div');
    senderName.className = 'sender-name';
    senderName.innerText = sender;

    const msgDiv = document.createElement('div');
    msgDiv.className = 'message';
    msgDiv.innerText = msg;
    if (isSelf) {
      msgDiv.classList.add('self');
    } else {
      msgDiv.classList.add('other');
    }

    container.appendChild(senderName);
    container.appendChild(msgDiv);

    // Align right for self, left for others
    if (isSelf) {
      container.style.alignSelf = 'flex-end';
    } else {
      container.style.alignSelf = 'flex-start';
    }

    messagesDiv.appendChild(container);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  // Load existing messages when page loads
  async function loadMessages() {
    const { data } = await supabase
      .from('messages')
      .select('*')
      .order('created_at', { ascending: true });
    data.forEach(msg => addMessage(msg.message, msg.username, msg.username === username));
  }

  // Send message: insert into database
  async function sendMessage(msg) {
    await supabase
      .from('messages')
      .insert({ username, message: msg });
  }

  // Handle new messages in real-time
  supabase
    .from('messages')
    .on('INSERT', payload => {
      const msg = payload.new;
      addMessage(msg.message, msg.username, msg.username === username);
    })
    .subscribe();

  // Send button click
  sendBtn.onclick = () => {
    const message = messageInput.value.trim();
    if (message) {
      sendMessage(message);
      messageInput.value = '';
    }
  };

  // Send message on Enter key
  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      sendBtn.click();
    }
  });

  // Load existing messages on page load
  loadMessages();
</script>
</body>
</html>
